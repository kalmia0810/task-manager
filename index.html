// ============================================================
// 定数・マスターデータ
// ============================================================
const WEEKDAY_NAMES = ["日", "月", "火", "水", "木", "金", "土"];

const FIXED_WEEKLY_TASKS = {
  0: [
    { id: "sun_order", text: "一般食品・米・雑貨 発注" },
    { id: "sun_pet", text: "ペットボトル回収" },
    { id: "sun_sale_prep", text: "菓子・雑貨カテゴリ割引 準備" },
  ],
  1: [
    { id: "mon_order", text: "菓子・酒 発注" },
    { id: "mon_sale_remove", text: "菓子・雑貨カテゴリ割引 撤去" },
    { id: "mon_uniform", text: "均一祭 準備" },
    { id: "mon_impro", text: "インプロPOP 付け" },
    { id: "mon_point", text: "ポイント3倍・チャージ特典POP 準備" },
  ],
  2: [
    { id: "tue_order", text: "一般食品・米 発注" },
    { id: "tue_food_sale_prep", text: "一般食品カテゴリ割引 準備" },
    { id: "tue_uniform_remove", text: "均一祭 撤去" },
    { id: "tue_impro_remove", text: "インプロPOP 撤去" },
    { id: "tue_point_remove", text: "ポイント3倍・チャージ特典POP 撤去" },
  ],
  3: [
    { id: "wed_order", text: "菓子・酒・雑貨 発注" },
    { id: "wed_food_sale_remove", text: "一般食品カテゴリ割引 撤去" },
  ],
  4: [
    { id: "thu_order", text: "一般食品・米 発注" },
  ],
  5: [
    { id: "fri_order", text: "菓子・酒 発注" },
    { id: "fri_sat_prep", text: "土曜市 準備" },
    { id: "fri_charge", text: "チャージ特典POP 準備" },
  ],
  6: [
    { id: "sat_order", text: "一般食品 発注" },
    { id: "sat_sat_remove", text: "土曜市 撤去" },
    { id: "sat_charge_remove", text: "チャージ特典POP 撤去" },
  ],
};

function getNthWeekday(year, month, weekday, n) {
  const d = new Date(year, month, 1);
  let count = 0;
  while (d.getMonth() === month) {
    if (d.getDay() === weekday) { count++; if (count === n) return d.getDate(); }
    d.setDate(d.getDate() + 1);
  }
  return null;
}

function getDateTasks(date) {
  const d = date.getDate(), month = date.getMonth(), year = date.getFullYear();
  const tasks = [];
  if (d === 9) {
    tasks.push({ id: "d9_card_prep", text: "カードの日 準備" });
    tasks.push({ id: "d9_makasena_preview", text: "まかせな祭 予告POP掲示（本番POPに予告貼付）" });
  }
  if (d === 10) tasks.push({ id: "d10_card_remove", text: "カードの日 撤去" });
  if (d === 14) tasks.push({ id: "d14_makasena_preview_remove", text: "まかせな祭 予告POP 撤去（予告部分のみ剥がす）" });
  if (d === 15) tasks.push({ id: "d15_makasena_remove", text: "まかせな祭 撤去" });
  if (d === 24) tasks.push({ id: "d24_card_prep", text: "カードの日 準備" });
  if (d === 25) tasks.push({ id: "d25_card_remove", text: "カードの日 撤去" });
  const sec2Mon = getNthWeekday(year, month, 1, 2);
  if (sec2Mon) { const db = new Date(year, month, sec2Mon - 1); if (db.getDate() === d && db.getMonth() === month) tasks.push({ id: "food_drive_prep", text: "フードドライブ 準備（第2月曜前日）" }); }
  const sec3Mon = getNthWeekday(year, month, 1, 3);
  if (sec3Mon) { const db = new Date(year, month, sec3Mon - 1); if (db.getDate() === d && db.getMonth() === month) tasks.push({ id: "food_drive_remove", text: "フードドライブ 撤去（第3月曜前日）" }); }
  return tasks;
}

// ============================================================
// ストレージ
// ============================================================
const STORAGE_KEY = "taskman_v2";
function loadState() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
function saveState(st) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(st)); } catch {} }

function createInitialState() {
  return {
    flyers: [],
    dailyLogs: {},
    shiftPlans: {},
  };
}

function getDateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}
function parseDate(key) { const [y,m,d] = key.split("-").map(Number); return new Date(y, m-1, d); }

function getShiftPeriods(baseDate) {
  const periods = [];
  for (let i = -1; i <= 2; i++) {
    const ref = new Date(baseDate.getFullYear(), baseDate.getMonth() + i, 1);
    const start = new Date(ref.getFullYear(), ref.getMonth(), 21);
    const end = new Date(ref.getFullYear(), ref.getMonth() + 1, 20);
    const key = `${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,"0")}`;
    const label = `${start.getFullYear()}/${String(start.getMonth()+1).padStart(2,"0")}/21 〜 ${end.getFullYear()}/${String(end.getMonth()+1).padStart(2,"0")}/20`;
    periods.push({ key, label, start, end });
  }
  return periods;
}

function getDatesInPeriod(start, end) {
  const dates = [];
  const d = new Date(start);
  while (d <= end) { dates.push(new Date(d)); d.setDate(d.getDate() + 1); }
  return dates;
}

// ============================================================
// ShiftPlanTab
// ============================================================
function ShiftPlanTab({ state, setState, today }) {
  const periods = getShiftPeriods(today);
  const currentPeriod = periods.find(p => p.start <= today && today <= p.end) || periods[1];
  const [selectedKey, setSelectedKey] = useState(currentPeriod.key);
  const [saveMsg, setSaveMsg] = useState("");
  const [showBulk, setShowBulk] = useState(false);
  const [bulkA, setBulkA] = useState(true);
  const [bulkB, setBulkB] = useState(true);
  const [bulkC, setBulkC] = useState(3);

  if (!state) return null;
  const period = periods.find(p => p.key === selectedKey) || periods[1];
  const dates = getDatesInPeriod(period.start, period.end);

  const getPlan = (key) => (state?.shiftPlans || {})[key] || { staffA: true, staffB: true, nightCashier: 3, myDayOff: false, noManager: false };
  const setPlan = (key, updates) => setState(s => ({ ...s, shiftPlans: { ...s.shiftPlans, [key]: { ...getPlan(key), ...updates } } }));

  const applyBulk = (targetDates) => {
    setState(s => {
      const next = { ...s.shiftPlans };
      targetDates.forEach(d => { const k = getDateKey(d); next[k] = { ...getPlan(k), staffA: bulkA, staffB: bulkB, nightCashier: bulkC }; });
      return { ...s, shiftPlans: next };
    });
    setSaveMsg("一括設定を適用しました"); setTimeout(() => setSaveMsg(""), 2000);
  };

  return (
    <div>
      <div style={S.card}>
        <div style={S.cardTitle}>📅 シフト期間を選択</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {periods.map(p => {
            const isCurrent = p.start <= today && today <= p.end;
            return (
              <button key={p.key} style={{ ...S.periodBtn, ...(selectedKey === p.key ? S.periodBtnActive : {}) }} onClick={() => setSelectedKey(p.key)}>
                {p.label}{isCurrent && <span style={S.currentBadge}>今月</span>}
              </button>
            );
          })}
        </div>
      </div>

      <div style={S.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={S.cardTitle}>⚡ 一括設定</div>
          <button style={S.smallBtn} onClick={() => setShowBulk(v => !v)}>{showBulk ? "閉じる" : "開く"}</button>
        </div>
        {showBulk && (
          <div style={{ marginTop: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 8 }}>
              <span style={S.bulkLabel}>Aさん</span>
              <label style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer" }}>
                <input type="checkbox" checked={bulkA} onChange={e => setBulkA(e.target.checked)} style={S.checkbox} />
                <span style={{ color: bulkA ? "#10b981" : "#ef4444", fontSize: 12 }}>{bulkA ? "出勤" : "不在"}</span>
              </label>
              <span style={S.bulkLabel}>Bさん</span>
              <label style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer" }}>
                <input type="checkbox" checked={bulkB} onChange={e => setBulkB(e.target.checked)} style={S.checkbox} />
                <span style={{ color: bulkB ? "#10b981" : "#ef4444", fontSize: 12 }}>{bulkB ? "出勤" : "不在"}</span>
              </label>
              <span style={S.bulkLabel}>夜レジ</span>
              <div style={{ display: "flex", gap: 3 }}>
                {[1,2,3,4,5].map(n => <button key={n} style={{ ...S.miniBtn, ...(bulkC === n ? S.miniBtnActive : {}) }} onClick={() => setBulkC(n)}>{n}</button>)}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              <button style={{ ...S.smallBtn, flex: 1 }} onClick={() => applyBulk(dates)}>全日に適用</button>
              <button style={{ ...S.smallBtn, flex: 1 }} onClick={() => applyBulk(dates.filter(d => d.getDay() !== 0 && d.getDay() !== 6))}>平日のみ</button>
              <button style={{ ...S.smallBtn, flex: 1 }} onClick={() => applyBulk(dates.filter(d => d.getDay() === 0 || d.getDay() === 6))}>土日のみ</button>
            </div>
          </div>
        )}
      </div>

      {saveMsg && <div style={S.saveMsg}>{saveMsg}</div>}

      <div style={S.card}>
        <div style={S.cardTitle}>🗓 日別シフト入力</div>
        <div style={{ display: "flex", gap: 4, marginBottom: 6, fontSize: 10, color: "#475569", paddingLeft: 2 }}>
          <span style={{ width: 54 }}>日付</span>
          <span style={{ width: 46 }}>自分</span>
          <span style={{ width: 46 }}>Aさん</span>
          <span style={{ width: 46 }}>Bさん</span>
          <span style={{ width: 46 }}>事務所</span>
          <span>夜レジ</span>
        </div>
        {dates.map(date => {
          const k = getDateKey(date);
          const plan = getPlan(k);
          const isToday = getDateKey(date) === getDateKey(today);
          const dow = date.getDay();
          return (
            <div key={k} style={{
              display: "flex", alignItems: "center", gap: 4, padding: "5px 4px", borderRadius: 6, marginBottom: 2,
              background: isToday ? "#0c2240" : dow === 0 ? "#1a0f0f" : dow === 6 ? "#0f1a2a" : "transparent",
              borderLeft: isToday ? "3px solid #38bdf8" : "3px solid transparent",
            }}>
              <div style={{ width: 54, flexShrink: 0 }}>
                <span style={{ fontSize: 12, fontWeight: isToday ? 700 : 400, color: dow === 0 ? "#f87171" : dow === 6 ? "#60a5fa" : "#e2e8f0" }}>
                  {date.getMonth()+1}/{date.getDate()}
                </span>
                <span style={{ fontSize: 10, color: dow === 0 ? "#f87171" : dow === 6 ? "#60a5fa" : "#64748b", marginLeft: 2 }}>
                  {WEEKDAY_NAMES[dow]}
                </span>
              </div>
              <div style={{ width: 46, flexShrink: 0 }}>
                <button style={{ ...S.shiftToggle, background: plan.myDayOff ? "#374151" : "#065f46", color: plan.myDayOff ? "#9ca3af" : "#6ee7b7" }}
                  onClick={() => setPlan(k, { myDayOff: !plan.myDayOff })}>
                  {plan.myDayOff ? "休み" : "出勤"}
                </button>
              </div>
              <div style={{ width: 46, flexShrink: 0 }}>
                <button style={{ ...S.shiftToggle, background: plan.staffA ? "#1d4ed8" : "#374151", color: plan.staffA ? "#bfdbfe" : "#9ca3af" }}
                  onClick={() => setPlan(k, { staffA: !plan.staffA })}>
                  {plan.staffA ? "出勤" : "不在"}
                </button>
              </div>
              <div style={{ width: 46, flexShrink: 0 }}>
                <button style={{ ...S.shiftToggle, background: plan.staffB ? "#1d4ed8" : "#374151", color: plan.staffB ? "#bfdbfe" : "#9ca3af" }}
                  onClick={() => setPlan(k, { staffB: !plan.staffB })}>
                  {plan.staffB ? "出勤" : "不在"}
                </button>
              </div>
              <div style={{ width: 46, flexShrink: 0 }}>
                <button style={{ ...S.shiftToggle, background: plan.noManager ? "#7c3aed" : "#374151", color: plan.noManager ? "#ddd6fe" : "#9ca3af" }}
                  onClick={() => setPlan(k, { noManager: !plan.noManager })}>
                  {plan.noManager ? "不在" : "在中"}
                </button>
              </div>
              <div style={{ display: "flex", gap: 2 }}>
                {[1,2,3,4,5].map(n => (
                  <button key={n} style={{ ...S.miniBtn, ...(plan.nightCashier === n ? S.miniBtnActive : {}), opacity: plan.myDayOff ? 0.35 : 1 }}
                    onClick={() => setPlan(k, { nightCashier: n })}>{n}</button>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ ...S.card, background: "#0f2744", border: "1px solid #1e40af" }}>
        <div style={{ fontSize: 12, color: "#60a5fa" }}>
          💡 ここで入力した内容はタスク画面に自動反映されます。当日に変更があった場合はタスク画面のチェックボックスで上書きできます。
        </div>
      </div>
    </div>
  );
}

// ============================================================
// App
// ============================================================
function App() {
  const [state, setState] = useState(null); // null = loading
  const [loaded, setLoaded] = useState(false);
  const [today, setToday] = useState(new Date());
  const [viewDate, setViewDate] = useState(new Date());
  const [tab, setTab] = useState("today");
  const [showAddFlyer, setShowAddFlyer] = useState(false);
  const [newFlyer, setNewFlyer] = useState({ label: "", start: "", end: "" });
  const [newCustomText, setNewCustomText] = useState("");
  const [backupMsg, setBackupMsg] = useState("");
  const [exportText, setExportText] = useState("");
  const [importText, setImportText] = useState("");

  useEffect(()=>{const t=setInterval(()=>setToday(new Date()),60000);return()=>clearInterval(t);},[]);
  useEffect(()=>{saveState(state);},[state]);

  const dateKey = getDateKey(viewDate);

  const getShiftPlan = useCallback((key) => (state?.shiftPlans || {})[key] || { staffA: true, staffB: true, nightCashier: 3, myDayOff: false, noManager: false }, [state?.shiftPlans]);

  const getDayLog = useCallback((key) => {
    const plan = (state?.shiftPlans || {})[key] || {};
    const defaults = { checkedTasks: [], staffA: plan.staffA !== undefined ? plan.staffA : true, staffB: plan.staffB !== undefined ? plan.staffB : true, nightCashier: plan.nightCashier !== undefined ? plan.nightCashier : 3, myDayOff: plan.myDayOff !== undefined ? plan.myDayOff : false, noManager: plan.noManager !== undefined ? plan.noManager : false, customTasks: [] };
    const saved = (state?.dailyLogs || {})[key];
    return saved ? { ...defaults, ...saved } : defaults;
  }, [state?.dailyLogs, state?.shiftPlans]);

  const updateDayLog = (key, updates) => setState(s => ({ ...s, dailyLogs: { ...s.dailyLogs, [key]: { ...getDayLog(key), ...updates } } }));

  const log = getDayLog(dateKey);

  const getAllTasks = (date, dayLog) => {
    const dow = date.getDay();
    const tasks = [];
    (FIXED_WEEKLY_TASKS[dow] || []).forEach(t => tasks.push({ ...t, category: "fixed" }));
    getDateTasks(date).forEach(t => tasks.push({ ...t, category: "date" }));
    const dKey = getDateKey(date);
    (state?.flyers || []).forEach(f => {
      if (f.end === dKey) tasks.push({ id: `flyer_end_${f.id}`, text: `【チラシ入替】${f.label} 最終日 → POP総入替`, category: "flyer" });
      if (f.start === dKey) tasks.push({ id: `flyer_start_${f.id}`, text: `【チラシ初日】${f.label} スタート`, category: "flyer" });
    });
    const isOrdA = [0, 2, 4].includes(dow), isOrdB = [1, 3, 5].includes(dow);
    if (!dayLog.staffA) {
      tasks.push(dayLog.nightCashier >= 3 ? { id: "var_paper", text: "【A不在】紙 補充", category: "variable" } : { id: "var_paper_drink_sake", text: "【A不在・レジ少】紙・飲料・酒 補充", category: "variable" });
      if (isOrdA) tasks.push({ id: "var_order_a", text: "【A不在】一般食品・米 発注（自分で対応）", category: "variable" });
    }
    if (!dayLog.staffB && isOrdB) tasks.push({ id: "var_order_b", text: "【B不在】菓子・酒 発注（自分で対応）", category: "variable" });
    if (dayLog.noManager) tasks.push({ id: "var_cash", text: "【事務所全員不在】釣銭補充・余剰金処理・翌日釣銭準備", category: "variable" });
    (dayLog.customTasks || []).forEach(t => tasks.push({ ...t, category: "custom" }));
    return tasks;
  };

  const allTasks = getAllTasks(viewDate, log);
  const checkedCount = allTasks.filter(t => (log.checkedTasks || []).includes(t.id)).length;
  const totalCount = allTasks.length;
  const progress = totalCount > 0 ? Math.round((checkedCount / totalCount) * 100) : 0;

  const toggleCheck = (id) => { const c = log.checkedTasks || []; updateDayLog(dateKey, { checkedTasks: c.includes(id) ? c.filter(x => x !== id) : [...c, id] }); };
  const addCustom = (text) => { if (!text.trim()) return; updateDayLog(dateKey, { customTasks: [...(log.customTasks || []), { id: `custom_${Date.now()}`, text: text.trim() }] }); };
  const removeCustom = (id) => updateDayLog(dateKey, { customTasks: (log.customTasks || []).filter(t => t.id !== id) });
  const carryOver = (task) => {
    const nextDate = new Date(viewDate); nextDate.setDate(nextDate.getDate() + 1);
    const nextKey = getDateKey(nextDate); const nextLog = getDayLog(nextKey);
    const already = (nextLog.customTasks || []).some(t => t.text === `【繰越】${task.text}` || t.text === task.text);
    if (already) return;
    updateDayLog(nextKey, { customTasks: [...(nextLog.customTasks || []), { id: `custom_${Date.now()}`, text: `【繰越】${task.text}` }] });
  };

  const handleExport = () => {
    const json = JSON.stringify(state, null, 2);
    navigator.clipboard.writeText(json).then(() => {
      setBackupMsg("クリップボードにコピーしました！メモ帳等に貼り付けて保存してください。");
    }).catch(() => {
      setExportText(json);
      setBackupMsg("以下のテキストをコピーして保存してください。");
    });
    setTimeout(() => setBackupMsg(""), 6000);
  };
  const handleImport = () => {
    try {
      const parsed = JSON.parse(importText);
      setState(parsed);
      setImportText("");
      setBackupMsg("復元しました！");
    } catch { setBackupMsg("JSONの形式が正しくありません"); }
    setTimeout(() => setBackupMsg(""), 3000);
  };

  const plan = getShiftPlan(dateKey);
  const isDiff = plan.staffA !== log.staffA || plan.staffB !== log.staffB || plan.nightCashier !== log.nightCashier || plan.myDayOff !== log.myDayOff || plan.noManager !== log.noManager;
  const syncFromPlan = () => updateDayLog(dateKey, { staffA: plan.staffA, staffB: plan.staffB, nightCashier: plan.nightCashier, myDayOff: plan.myDayOff, noManager: plan.noManager });

  const catColors = { fixed: "#3b82f6", date: "#8b5cf6", flyer: "#f59e0b", variable: "#ef4444", custom: "#10b981" };
  const catLabels = { fixed: "定期", date: "日付", flyer: "チラシ", variable: "変動", custom: "追加" };
  const isToday = getDateKey(viewDate) === getDateKey(today);

  return (
    <div style={S.root}>
      <div style={S.header}>
        <div style={S.headerTop}>
          <div>
            <div style={S.headerTitle}>業務タスク</div>
            <div style={S.headerSub}>{today.getFullYear()}/{String(today.getMonth()+1).padStart(2,"0")}/{String(today.getDate()).padStart(2,"0")}（{WEEKDAY_NAMES[today.getDay()]}）今日</div>
          </div>
          <svg width="56" height="56" viewBox="0 0 56 56">
            <circle cx="28" cy="28" r="22" fill="none" stroke="#1e293b" strokeWidth="5"/>
            <circle cx="28" cy="28" r="22" fill="none" stroke="#38bdf8" strokeWidth="5"
              strokeDasharray={`${2*Math.PI*22}`} strokeDashoffset={`${2*Math.PI*22*(1-progress/100)}`}
              strokeLinecap="round" transform="rotate(-90 28 28)" style={{transition:"stroke-dashoffset 0.4s"}}/>
            <text x="28" y="33" textAnchor="middle" fill="#e2e8f0" fontSize="13" fontWeight="700">{progress}%</text>
          </svg>
        </div>
        <div style={S.dateNav}>
          <button style={S.navBtn} onClick={() => { const d = new Date(viewDate); d.setDate(d.getDate()-1); setViewDate(d); }}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={{...S.viewDateLabel, color: isToday ? "#38bdf8" : "#94a3b8"}}>
              {viewDate.getMonth()+1}/{viewDate.getDate()}（{WEEKDAY_NAMES[viewDate.getDay()]}）
              {isToday && <span style={S.todayBadge}>TODAY</span>}
              {log.myDayOff && <span style={S.dayOffBadge}>休み</span>}
            </div>
            <div style={S.taskCount}>{checkedCount}/{totalCount} 完了</div>
          </div>
          <button style={S.navBtn} onClick={() => { const d = new Date(viewDate); d.setDate(d.getDate()+1); setViewDate(d); }}>›</button>
        </div>
      </div>

      <div style={S.tabBar}>
        {[["today","📋 タスク"],["shift","👤 シフト"],["flyer","📄 チラシ"],["settings","⚙️ 設定"],["backup","💾 BK"]].map(([key,label]) => (
          <button key={key} style={{...S.tab, ...(tab===key ? S.tabActive : {})}} onClick={()=>setTab(key)}>{label}</button>
        ))}
      </div>

      <div style={S.body}>

        {tab === "today" && (
          <div>
            {log.myDayOff && <div style={S.dayOffBanner}>🏠 本日は休日として登録されています</div>}

            <div style={S.card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <div style={S.cardTitle}>👥 シフト・人員</div>
                {isDiff && <button style={S.syncBtn} onClick={syncFromPlan}>📅 事前登録に戻す</button>}
              </div>
              <div style={{ marginBottom: 10 }}>
                <label style={S.shiftLabel}>
                  <input type="checkbox" checked={!log.myDayOff} onChange={e => updateDayLog(dateKey, { myDayOff: !e.target.checked })} style={S.checkbox}/>
                  <span style={{ ...S.staffBadge, background: !log.myDayOff ? "#065f46" : "#374151" }}>自分</span>
                  {!log.myDayOff ? <span style={S.present}>出勤</span> : <span style={S.absent}>休み</span>}
                </label>
              </div>
              <div style={S.shiftRow}>
                <label style={S.shiftLabel}>
                  <input type="checkbox" checked={log.staffA} onChange={e => updateDayLog(dateKey, { staffA: e.target.checked })} style={S.checkbox}/>
                  <span style={{ ...S.staffBadge, background: log.staffA ? "#1d4ed8" : "#374151" }}>Aさん（食品）</span>
                  {log.staffA ? <span style={S.present}>出勤</span> : <span style={S.absent}>不在</span>}
                </label>
                <label style={S.shiftLabel}>
                  <input type="checkbox" checked={log.staffB} onChange={e => updateDayLog(dateKey, { staffB: e.target.checked })} style={S.checkbox}/>
                  <span style={{ ...S.staffBadge, background: log.staffB ? "#1d4ed8" : "#374151" }}>Bさん（菓子酒）</span>
                  {log.staffB ? <span style={S.present}>出勤</span> : <span style={S.absent}>不在</span>}
                </label>
                <label style={S.shiftLabel}>
                  <input type="checkbox" checked={log.noManager} onChange={e => updateDayLog(dateKey, { noManager: e.target.checked })} style={S.checkbox}/>
                  <span style={{ ...S.staffBadge, background: log.noManager ? "#7c3aed" : "#374151" }}>店長・事務所パート</span>
                  {log.noManager ? <span style={S.absent}>全員不在</span> : <span style={S.present}>在中</span>}
                </label>
              </div>
              <div style={S.cashierRow}>
                <span style={S.cashierLabel}>夜レジ人数</span>
                <div style={S.cashierBtns}>
                  {[1,2,3,4,5].map(n => <button key={n} style={{...S.cashierBtn, ...(log.nightCashier===n ? S.cashierBtnActive : {})}} onClick={() => updateDayLog(dateKey, { nightCashier: n })}>{n}人</button>)}
                </div>
              </div>
            </div>

            {/* チラシリマインド */}
            {(() => {
              const sorted = [...(state?.flyers||[])].sort((a,b) => a.start > b.start ? 1 : -1);
              const alertFlyers = sorted.filter(f => { const days = Math.ceil((parseDate(f.end) - viewDate) / 86400000); return days >= 0 && days <= 3 && !f.prepDone; });
              const nextFlyer = sorted.find(f => parseDate(f.start) > viewDate);
              return (
                <>
                  {alertFlyers.map(f => (
                    <div key={f.id} style={S.flyerRemind}>
                      <span>📌 【事前準備】{f.label} 終了まで{Math.ceil((parseDate(f.end)-viewDate)/86400000)}日 — POP作成・売変予約</span>
                      <button style={S.prepDoneBtn} onClick={() => setState(s => ({...s, flyers: s.flyers.map(fl => fl.id===f.id ? {...fl,prepDone:true} : fl)}))}>完了</button>
                    </div>
                  ))}
                  {nextFlyer && (() => {
                    const days = Math.ceil((parseDate(nextFlyer.start) - viewDate) / 86400000);
                    if (!nextFlyer.prepDone && alertFlyers.length === 0 && days <= 7) return (
                      <div key="remind" style={S.flyerRemind}>
                        <span>📌 【事前準備】{nextFlyer.label} 初日まで{days}日 — POP作成・売変予約</span>
                        <button style={S.prepDoneBtn} onClick={() => setState(s => ({...s, flyers: s.flyers.map(fl => fl.id===nextFlyer.id ? {...fl,prepDone:true} : fl)}))}>完了</button>
                      </div>
                    );
                    return (
                      <div key="cd" style={S.flyerCountdown}>
                        <span style={S.flyerCountdownIcon}>📄</span>
                        <div style={S.flyerCountdownBody}>
                          <div style={S.flyerCountdownLabel}>次回チラシ</div>
                          <div style={S.flyerCountdownName}>{nextFlyer.label}</div>
                          <div style={S.flyerCountdownDate}>{nextFlyer.start}（{WEEKDAY_NAMES[parseDate(nextFlyer.start).getDay()]}）初日</div>
                        </div>
                        <div style={S.flyerCountdownDays}>
                          <span style={S.flyerCountdownNum}>{days}</span>
                          <span style={S.flyerCountdownUnit}>日後</span>
                        </div>
                      </div>
                    );
                  })()}
                </>
              );
            })()}

            {allTasks.length === 0
              ? <div style={S.emptyMsg}>この日のタスクはありません</div>
              : ["fixed","date","flyer","variable","custom"].map(cat => {
                  const ct = allTasks.filter(t => t.category === cat);
                  if (!ct.length) return null;
                  return (
                    <div key={cat} style={S.section}>
                      <div style={{...S.sectionLabel, color: catColors[cat]}}>● {catLabels[cat]}タスク</div>
                      {ct.map(task => {
                        const checked = (log.checkedTasks||[]).includes(task.id);
                        return (
                          <div key={task.id} style={{...S.taskRow, ...(checked ? S.taskChecked : {})}} onClick={() => toggleCheck(task.id)}>
                            <div style={{...S.taskCheck, borderColor: catColors[cat], background: checked ? catColors[cat] : "transparent"}}>
                              {checked && <span style={{color:"#fff",fontSize:12}}>✓</span>}
                            </div>
                            <span style={{...S.taskText, textDecoration: checked?"line-through":"none", color: checked?"#64748b":"#e2e8f0"}}>{task.text}</span>
                            {cat === "custom" && !checked && <button style={S.carryOverBtn} onClick={e=>{e.stopPropagation();carryOver(task);}}>翌日→</button>}
                            {cat === "custom" && <button style={S.removeBtn} onClick={e=>{e.stopPropagation();removeCustom(task.id);}}>✕</button>}
                          </div>
                        );
                      })}
                    </div>
                  );
                })
            }

            <div style={S.card}>
              <div style={S.cardTitle}>＋ この日にタスクを追加</div>
              <div style={S.addRow}>
                <input style={S.input} placeholder="例：特売発注締切 14:00" value={newCustomText} onChange={e=>setNewCustomText(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"){addCustom(newCustomText);setNewCustomText("");}}}/>
                <button style={S.addBtn} onClick={()=>{addCustom(newCustomText);setNewCustomText("");}}>追加</button>
              </div>
            </div>
          </div>
        )}

        {tab === "shift" && <ShiftPlanTab state={state} setState={setState} today={today} />}

        {tab === "flyer" && (
          <div>
            <div style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={S.cardTitle}>📄 チラシ期間管理</div>
                <button style={S.addBtn} onClick={()=>setShowAddFlyer(v=>!v)}>＋ 追加</button>
              </div>
              {showAddFlyer && (
                <div style={S.addForm}>
                  <input style={S.input} placeholder="チラシ名（例：6月第1弾）" value={newFlyer.label} onChange={e=>setNewFlyer(f=>({...f,label:e.target.value}))}/>
                  <div style={S.dateInputRow}>
                    <div style={{flex:1}}><div style={S.inputLabel}>初日</div><input type="date" style={S.input} value={newFlyer.start} onChange={e=>setNewFlyer(f=>({...f,start:e.target.value}))}/></div>
                    <div style={{flex:1}}><div style={S.inputLabel}>最終日</div><input type="date" style={S.input} value={newFlyer.end} onChange={e=>setNewFlyer(f=>({...f,end:e.target.value}))}/></div>
                  </div>
                  <button style={{...S.addBtn,width:"100%"}} onClick={()=>{
                    if(!newFlyer.label||!newFlyer.start||!newFlyer.end) return;
                    setState(s=>({...s,flyers:[...s.flyers,{...newFlyer,id:`fly_${Date.now()}`,prepDone:false}]}));
                    setNewFlyer({label:"",start:"",end:""}); setShowAddFlyer(false);
                  }}>登録</button>
                </div>
              )}
            </div>
            {(state?.flyers||[]).length === 0 && <div style={S.emptyMsg}>チラシが登録されていません</div>}
            {[...(state?.flyers||[])].sort((a,b)=>a.start>b.start?1:-1).map(f => {
              const fs=parseDate(f.start),fe=parseDate(f.end);
              const isActive=fs<=today&&today<=fe,isPast=fe<today;
              return (
                <div key={f.id} style={{...S.flyerCard,borderColor:isActive?"#38bdf8":isPast?"#374151":"#1e293b"}}>
                  <div style={S.flyerTop}>
                    <div><div style={S.flyerName}>{f.label}</div><div style={S.flyerDate}>{f.start} 〜 {f.end}（{WEEKDAY_NAMES[fs.getDay()]}〜{WEEKDAY_NAMES[fe.getDay()]}）</div></div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      {isActive&&<span style={S.activeBadge}>開催中</span>}
                      {isPast&&<span style={S.pastBadge}>終了</span>}
                      <button style={S.removeBtn} onClick={()=>setState(s=>({...s,flyers:s.flyers.filter(x=>x.id!==f.id)}))}>✕</button>
                    </div>
                  </div>
                  <div style={S.prepRow}>
                    <span style={{color:f.prepDone?"#10b981":"#94a3b8",fontSize:12}}>{f.prepDone?"✅ 事前準備完了":"⏳ 事前準備未完了"}</span>
                    <button style={{...S.prepDoneBtn,opacity:f.prepDone?0.5:1}} onClick={()=>setState(s=>({...s,flyers:s.flyers.map(fl=>fl.id===f.id?{...fl,prepDone:!fl.prepDone}:fl)}))}>
                      {f.prepDone?"戻す":"完了にする"}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tab === "settings" && (
          <div>
            <div style={S.card}>
              <div style={S.cardTitle}>📋 固定タスク一覧（参照用）</div>
              {WEEKDAY_NAMES.map((name,dow) => (
                <div key={dow} style={S.weekSection}>
                  <div style={S.weekLabel}>{name}曜日</div>
                  {(FIXED_WEEKLY_TASKS[dow]||[]).map(t=><div key={t.id} style={S.refTask}>・{t.text}</div>)}
                  {!(FIXED_WEEKLY_TASKS[dow]||[]).length&&<div style={S.refTask}>（なし）</div>}
                </div>
              ))}
              <div style={S.weekSection}>
                <div style={S.weekLabel}>日付固定</div>
                {["9日：カードの日準備 ／ まかせな祭予告POP掲示","10日：カードの日撤去","14日：まかせな祭予告POP撤去","15日：まかせな祭撤去","24日：カードの日準備","25日：カードの日撤去","第2月曜前日：フードドライブ準備","第3月曜前日：フードドライブ撤去"].map((t,i)=><div key={i} style={S.refTask}>・{t}</div>)}
              </div>
            </div>
          </div>
        )}

        {tab === "backup" && (
          <div>
            <div style={S.card}>
              <div style={S.cardTitle}>📤 バックアップ（書き出し）</div>
              <p style={S.helpText}>全データをテキストにコピーします。メモ帳・メモアプリ等に貼り付けて保存してください。</p>
              <button style={{...S.addBtn,width:"100%",marginBottom:8}} onClick={handleExport}>クリップボードにコピー</button>
              {exportText && (
                <textarea
                  style={{...S.input, width:"100%", height:120, fontSize:10, marginTop:4, resize:"none", fontFamily:"monospace", boxSizing:"border-box"}}
                  value={exportText}
                  readOnly
                  onFocus={e=>e.target.select()}
                />
              )}
              {backupMsg && <div style={S.backupMsg}>{backupMsg}</div>}
            </div>
            <div style={S.card}>
              <div style={S.cardTitle}>📥 バックアップから復元</div>
              <p style={S.helpText}>保存したJSONテキストを以下に貼り付けて「復元」を押してください。</p>
              <textarea
                style={{...S.input, width:"100%", height:100, fontSize:10, marginBottom:8, resize:"none", fontFamily:"monospace", boxSizing:"border-box"}}
                placeholder='{"flyers":[],"dailyLogs":{},"shiftPlans":{}}'
                value={importText}
                onChange={e=>setImportText(e.target.value)}
              />
              <button style={{...S.addBtn,width:"100%"}} onClick={handleImport}>復元する</button>
            </div>
            <div style={S.card}>
              <div style={S.cardTitle}>🗑️ データリセット</div>
              <p style={S.helpText}>全データを削除してリセットします。この操作は取り消せません。</p>
              <button style={{...S.addBtn,width:"100%",background:"#7f1d1d",border:"1px solid #ef4444"}} onClick={()=>{
                if(window.confirm("全データをリセットしますか？バックアップを先に取ることをおすすめします。")){
                  setState(createInitialState()); setBackupMsg("リセットしました"); setTimeout(()=>setBackupMsg(""),3000);
                }
              }}>⚠️ リセット</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// ============================================================
// スタイル
// ============================================================

  shiftRow: { display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 },
  shiftLabel: { display: "flex", alignItems: "center", gap: 8, cursor: "pointer" },
  checkbox: { width: 16, height: 16, accentColor: "#38bdf8" },
  staffBadge: { fontSize: 12, padding: "2px 8px", borderRadius: 6, color: "#e2e8f0", fontWeight: 600 },
  present: { fontSize: 11, color: "#10b981" },
  absent: { fontSize: 11, color: "#ef4444" },
  cashierRow: { display: "flex", alignItems: "center", gap: 8 },

  cashierBtns: { display: "flex", gap: 4, flexWrap: "wrap" },
  cashierBtn: { background: "#334155", border: "none", color: "#94a3b8", fontSize: 12, padding: "4px 10px", borderRadius: 6, cursor: "pointer" },
  cashierBtnActive: { background: "#0369a1", color: "#fff", fontWeight: 700 },
  syncBtn: { background: "none", border: "1px solid #334155", color: "#60a5fa", fontSize: 10, padding: "4px 8px", borderRadius: 6, cursor: "pointer" },
  section: { marginBottom: 8 },
  sectionLabel: { fontSize: 11, fontWeight: 700, marginBottom: 4, paddingLeft: 4, letterSpacing: 1 },
  taskRow: { display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: "#1e293b", borderRadius: 8, marginBottom: 4, cursor: "pointer", border: "1px solid #334155" },
  taskChecked: { background: "#0f172a", borderColor: "#1e293b" },
  taskCheck: { width: 20, height: 20, borderRadius: 6, border: "2px solid", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" },
  taskText: { fontSize: 13, flex: 1, lineHeight: 1.4 },
  removeBtn: { background: "none", border: "none", color: "#475569", cursor: "pointer", fontSize: 14, padding: "0 4px" },
  carryOverBtn: { background: "none", border: "1px solid #334155", color: "#60a5fa", cursor: "pointer", fontSize: 10, padding: "2px 6px", borderRadius: 5, whiteSpace: "nowrap", flexShrink: 0 },
  flyerRemind: { background: "#1c1408", border: "1px solid #92400e", borderRadius: 8, padding: "10px 12px", fontSize: 12, color: "#fcd34d", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 },
  prepDoneBtn: { background: "#065f46", border: "none", color: "#6ee7b7", fontSize: 11, padding: "4px 8px", borderRadius: 6, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 },
  flyerCountdown: { display: "flex", alignItems: "center", gap: 10, background: "#0f2744", border: "1px solid #1e40af", borderRadius: 10, padding: "10px 14px", marginBottom: 8 },
  flyerCountdownIcon: { fontSize: 20, flexShrink: 0 },
  flyerCountdownBody: { flex: 1, minWidth: 0 },
  flyerCountdownLabel: { fontSize: 10, color: "#60a5fa", fontWeight: 700, letterSpacing: 1, marginBottom: 1 },
  flyerCountdownName: { fontSize: 13, fontWeight: 700, color: "#e2e8f0", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" },
  flyerCountdownDate: { fontSize: 11, color: "#64748b", marginTop: 1 },
  flyerCountdownDays: { display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 },
  flyerCountdownNum: { fontSize: 28, fontWeight: 800, color: "#38bdf8", lineHeight: 1 },
  flyerCountdownUnit: { fontSize: 10, color: "#60a5fa", marginTop: 1 },
  emptyMsg: { textAlign: "center", color: "#475569", fontSize: 13, padding: 24 },
  addRow: { display: "flex", gap: 8 },
  input: { flex: 1, background: "#0f172a", border: "1px solid #334155", borderRadius: 8, color: "#e2e8f0", padding: "8px 10px", fontSize: 13, outline: "none" },
  addBtn: { background: "#1d4ed8", border: "none", color: "#fff", padding: "8px 14px", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap" },
  addForm: { display: "flex", flexDirection: "column", gap: 8, marginTop: 10, padding: 10, background: "#0f172a", borderRadius: 8 },
  dateInputRow: { display: "flex", gap: 8 },
  inputLabel: { fontSize: 11, color: "#64748b", marginBottom: 3 },
  flyerCard: { background: "#1e293b", borderRadius: 12, padding: 14, marginBottom: 10, border: "1px solid" },
  flyerTop: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 },
  flyerName: { fontWeight: 700, fontSize: 14, color: "#e2e8f0" },
  flyerDate: { fontSize: 11, color: "#64748b", marginTop: 2 },
  activeBadge: { background: "#0c4a6e", color: "#38bdf8", fontSize: 10, padding: "2px 6px", borderRadius: 4, fontWeight: 700 },
  pastBadge: { background: "#1e293b", color: "#475569", fontSize: 10, padding: "2px 6px", borderRadius: 4 },
  prepRow: { display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "1px solid #334155", paddingTop: 8, marginTop: 4 },
  weekSection: { marginBottom: 12 },
  weekLabel: { fontSize: 12, fontWeight: 700, color: "#38bdf8", marginBottom: 4 },
  refTask: { fontSize: 12, color: "#94a3b8", padding: "2px 0" },
  helpText: { fontSize: 12, color: "#64748b", marginBottom: 10 },
  backupMsg: { marginTop: 10, textAlign: "center", color: "#10b981", fontSize: 13, fontWeight: 700 },
  // シフトタブ
  periodBtn: { background: "#0f172a", border: "1px solid #334155", color: "#94a3b8", padding: "10px 12px", borderRadius: 8, cursor: "pointer", fontSize: 12, textAlign: "left" },
  periodBtnActive: { border: "1px solid #38bdf8", color: "#e2e8f0", background: "#0c2240" },
  currentBadge: { background: "#0c4a6e", color: "#38bdf8", fontSize: 9, padding: "1px 5px", borderRadius: 4, marginLeft: 8, fontWeight: 700 },
  shiftToggle: { border: "none", borderRadius: 5, padding: "3px 0", cursor: "pointer", fontWeight: 600, fontSize: 10, width: "100%", textAlign: "center" },
  miniBtn: { background: "#334155", border: "none", color: "#94a3b8", fontSize: 11, width: 22, height: 22, borderRadius: 5, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" },
  miniBtnActive: { background: "#0369a1", color: "#fff", fontWeight: 700 },
  bulkLabel: { fontSize: 11, color: "#94a3b8" },
  smallBtn: { background: "#1e40af", border: "none", color: "#bfdbfe", fontSize: 11, padding: "6px 10px", borderRadius: 6, cursor: "pointer" },
  saveMsg: { background: "#064e3b", border: "1px solid #10b981", borderRadius: 8, padding: "8px 12px", fontSize: 12, color: "#6ee7b7", marginBottom: 10, textAlign: "center" },
};

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
