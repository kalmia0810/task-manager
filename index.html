<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>業務タスク管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f172a;font-family:'Noto Sans JP',sans-serif;color:#e2e8f0;max-width:480px;margin:0 auto;padding-bottom:40px;}
button{cursor:pointer;font-family:inherit;}
input,textarea{font-family:inherit;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);}

/* ヘッダー */
#header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:16px 16px 0;border-bottom:1px solid #1e293b;}
#header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
#header-title{font-size:20px;font-weight:700;color:#f1f5f9;letter-spacing:2px;}
#header-sub{font-size:12px;color:#64748b;margin-top:2px;}
#date-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 0 12px;}
.nav-btn{background:none;border:1px solid #334155;color:#94a3b8;font-size:22px;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
#view-date-label{font-size:16px;font-weight:700;text-align:center;}
#task-count{font-size:11px;color:#64748b;margin-top:2px;text-align:center;}
.today-badge{background:#38bdf8;color:#0f172a;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:6px;}
.dayoff-badge{background:#374151;color:#9ca3af;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:6px;}

/* タブ */
#tab-bar{display:flex;background:#1e293b;border-bottom:1px solid #334155;overflow-x:auto;}
.tab-btn{flex:1;padding:10px 2px;background:none;border:none;color:#64748b;font-size:10px;white-space:nowrap;font-weight:500;border-bottom:2px solid transparent;}
.tab-btn.active{color:#38bdf8;border-bottom:2px solid #38bdf8;}

/* ボディ */
#body{padding:12px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* カード */
.card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #334155;}
.card-title{font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:10px;letter-spacing:1px;}

/* バナー */
.dayoff-banner{background:#1a1a2e;border:1px solid #374151;border-radius:8px;padding:10px 14px;font-size:12px;color:#9ca3af;margin-bottom:10px;text-align:center;}

/* シフト */
.shift-row{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.shift-label{display:flex;align-items:center;gap:8px;}
.staff-badge{font-size:12px;padding:2px 8px;border-radius:6px;color:#e2e8f0;font-weight:600;}
.present{font-size:11px;color:#10b981;}
.absent{font-size:11px;color:#ef4444;}
.cashier-row{display:flex;align-items:center;gap:8px;}
.cashier-label{font-size:12px;color:#94a3b8;white-space:nowrap;}
.cashier-btns{display:flex;gap:4px;flex-wrap:wrap;}
.cashier-btn{background:#334155;border:none;color:#94a3b8;font-size:12px;padding:4px 10px;border-radius:6px;}
.cashier-btn.active{background:#0369a1;color:#fff;font-weight:700;}
.sync-btn{background:none;border:1px solid #334155;color:#60a5fa;font-size:10px;padding:4px 8px;border-radius:6px;}

/* チラシリマインド */
.flyer-remind{background:#1c1408;border:1px solid #92400e;border-radius:8px;padding:10px 12px;font-size:12px;color:#fcd34d;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.prep-done-btn{background:#065f46;border:none;color:#6ee7b7;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;}
.flyer-countdown{display:flex;align-items:center;gap:10px;background:#0f2744;border:1px solid #1e40af;border-radius:10px;padding:10px 14px;margin-bottom:8px;}
.flyer-cd-icon{font-size:20px;flex-shrink:0;}
.flyer-cd-body{flex:1;min-width:0;}
.flyer-cd-label{font-size:10px;color:#60a5fa;font-weight:700;letter-spacing:1px;margin-bottom:1px;}
.flyer-cd-name{font-size:13px;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.flyer-cd-date{font-size:11px;color:#64748b;margin-top:1px;}
.flyer-cd-days{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.flyer-cd-num{font-size:28px;font-weight:800;color:#38bdf8;line-height:1;}
.flyer-cd-unit{font-size:10px;color:#60a5fa;margin-top:1px;}

/* タスク */
.section{margin-bottom:8px;}
.section-label{font-size:11px;font-weight:700;margin-bottom:4px;padding-left:4px;letter-spacing:1px;}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#1e293b;border-radius:8px;margin-bottom:4px;border:1px solid #334155;cursor:pointer;user-select:none;}
.task-row.checked{background:#0f172a;border-color:#1e293b;}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;}
.task-text{font-size:13px;flex:1;line-height:1.4;}
.task-row.checked .task-text{text-decoration:line-through;color:#64748b;}
.remove-btn{background:none;border:none;color:#475569;font-size:14px;padding:0 4px;}
.carryover-btn{background:none;border:1px solid #334155;color:#60a5fa;font-size:10px;padding:2px 6px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
.empty-msg{text-align:center;color:#475569;font-size:13px;padding:24px;}

/* 入力 */
.add-row{display:flex;gap:8px;}
input[type="text"],.text-input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:8px 10px;font-size:13px;outline:none;}
input[type="date"]{background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:8px 10px;font-size:13px;outline:none;width:100%;}
textarea{background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:8px 10px;font-size:13px;outline:none;resize:none;width:100%;}
.add-btn{background:#1d4ed8;border:none;color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap;}
.add-form{display:flex;flex-direction:column;gap:8px;margin-top:10px;padding:10px;background:#0f172a;border-radius:8px;}
.date-input-row{display:flex;gap:8px;}
.date-input-row>div{flex:1;}
.input-label{font-size:11px;color:#64748b;margin-bottom:3px;}

/* チラシカード */
.flyer-card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1e293b;}
.flyer-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.flyer-name{font-weight:700;font-size:14px;color:#e2e8f0;}
.flyer-date-text{font-size:11px;color:#64748b;margin-top:2px;}
.flyer-badges{display:flex;gap:6px;align-items:center;}
.active-badge{background:#0c4a6e;color:#38bdf8;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;}
.past-badge{background:#1e293b;color:#475569;font-size:10px;padding:2px 6px;border-radius:4px;}
.prep-row{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #334155;padding-top:8px;margin-top:4px;}

/* シフトタブ */
.period-btn{background:#0f172a;border:1px solid #334155;color:#94a3b8;padding:10px 12px;border-radius:8px;font-size:12px;text-align:left;width:100%;margin-bottom:6px;}
.period-btn.active{border-color:#38bdf8;color:#e2e8f0;background:#0c2240;}
.current-badge{background:#0c4a6e;color:#38bdf8;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:8px;font-weight:700;}
.shift-table-header{display:flex;gap:4px;margin-bottom:6px;font-size:10px;color:#475569;padding-left:2px;}
.shift-table-row{display:flex;align-items:center;gap:4px;padding:5px 4px;border-radius:6px;margin-bottom:2px;}
.shift-toggle{border:none;border-radius:5px;padding:3px 0;font-weight:600;font-size:10px;width:100%;text-align:center;}
.mini-btn{background:#334155;border:none;color:#94a3b8;font-size:11px;width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.mini-btn.active{background:#0369a1;color:#fff;font-weight:700;}
.small-btn{background:#1e40af;border:none;color:#bfdbfe;font-size:11px;padding:6px 10px;border-radius:6px;}
.save-msg{background:#064e3b;border:1px solid #10b981;border-radius:8px;padding:8px 12px;font-size:12px;color:#6ee7b7;margin-bottom:10px;text-align:center;}
.info-card{background:#0f2744;border:1px solid #1e40af;border-radius:12px;padding:14px;margin-bottom:12px;font-size:12px;color:#60a5fa;}

/* 設定タブ */
.week-section{margin-bottom:12px;}
.week-label{font-size:12px;font-weight:700;color:#38bdf8;margin-bottom:4px;}
.ref-task{font-size:12px;color:#94a3b8;padding:2px 0;}

/* バックアップ */
.help-text{font-size:12px;color:#64748b;margin-bottom:10px;}
.backup-msg{margin-top:10px;text-align:center;color:#10b981;font-size:13px;font-weight:700;}
.reset-btn{background:#7f1d1d;border:1px solid #ef4444;color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;width:100%;}

/* プログレス */
#progress-svg{flex-shrink:0;}
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div>
      <div id="header-title">業務タスク</div>
      <div id="header-sub"></div>
    </div>
    <svg id="progress-svg" width="56" height="56" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="22" fill="none" stroke="#1e293b" stroke-width="5"/>
      <circle id="progress-circle" cx="28" cy="28" r="22" fill="none" stroke="#38bdf8" stroke-width="5"
        stroke-dasharray="138.2" stroke-dashoffset="138.2"
        stroke-linecap="round" transform="rotate(-90 28 28)" style="transition:stroke-dashoffset 0.4s"/>
      <text id="progress-text" x="28" y="33" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">0%</text>
    </svg>
  </div>
  <div id="date-nav">
    <button class="nav-btn" id="prev-btn">‹</button>
    <div>
      <div id="view-date-label"></div>
      <div id="task-count"></div>
    </div>
    <button class="nav-btn" id="next-btn">›</button>
  </div>
</div>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="today">📋 タスク</button>
  <button class="tab-btn" data-tab="shift">👤 シフト</button>
  <button class="tab-btn" data-tab="flyer">📄 チラシ</button>
  <button class="tab-btn" data-tab="settings">⚙️ 設定</button>
  <button class="tab-btn" data-tab="backup">💾 BK</button>
</div>

<div id="body">
  <div class="tab-panel active" id="panel-today"></div>
  <div class="tab-panel" id="panel-shift"></div>
  <div class="tab-panel" id="panel-flyer"></div>
  <div class="tab-panel" id="panel-settings"></div>
  <div class="tab-panel" id="panel-backup"></div>
</div>

<script>
// ============================================================
// 定数
// ============================================================
const WEEKDAY = ["日","月","火","水","木","金","土"];

const WEEKLY_TASKS = {
  0:[{id:"sun_order",text:"一般食品・米・雑貨 発注"},{id:"sun_pet",text:"ペットボトル回収"},{id:"sun_sale_prep",text:"菓子・雑貨カテゴリ割引 準備"}],
  1:[{id:"mon_order",text:"菓子・酒 発注"},{id:"mon_sale_remove",text:"菓子・雑貨カテゴリ割引 撤去"},{id:"mon_uniform",text:"均一祭 準備"},{id:"mon_impro",text:"インプロPOP 付け"},{id:"mon_point",text:"ポイント3倍・チャージ特典POP 準備"}],
  2:[{id:"tue_order",text:"一般食品・米 発注"},{id:"tue_food_sale_prep",text:"一般食品カテゴリ割引 準備"},{id:"tue_uniform_remove",text:"均一祭 撤去"},{id:"tue_impro_remove",text:"インプロPOP 撤去"},{id:"tue_point_remove",text:"ポイント3倍・チャージ特典POP 撤去"}],
  3:[{id:"wed_order",text:"菓子・酒・雑貨 発注"},{id:"wed_food_sale_remove",text:"一般食品カテゴリ割引 撤去"}],
  4:[{id:"thu_order",text:"一般食品・米 発注"}],
  5:[{id:"fri_order",text:"菓子・酒 発注"},{id:"fri_sat_prep",text:"土曜市 準備"},{id:"fri_charge",text:"チャージ特典POP 準備"}],
  6:[{id:"sat_order",text:"一般食品 発注"},{id:"sat_sat_remove",text:"土曜市 撤去"},{id:"sat_charge_remove",text:"チャージ特典POP 撤去"}],
};

const CAT_COLORS = {fixed:"#3b82f6",date:"#8b5cf6",flyer:"#f59e0b",variable:"#ef4444",custom:"#10b981"};
const CAT_LABELS = {fixed:"定期",date:"日付",flyer:"チラシ",variable:"変動",custom:"追加"};

// ============================================================
// ストレージ
// ============================================================
const STORAGE_KEY = "taskman_v2";
function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}
function createInitialState() {
  return { flyers:[], dailyLogs:{}, shiftPlans:{} };
}

let state = loadState() || createInitialState();
if (!state.shiftPlans) state.shiftPlans = {};

// ============================================================
// ユーティリティ
// ============================================================
function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}
function parseDate(key) {
  const [y,m,d] = key.split("-").map(Number); return new Date(y,m-1,d);
}
function getNthWeekday(year,month,weekday,n) {
  const d = new Date(year,month,1); let count=0;
  while(d.getMonth()===month){ if(d.getDay()===weekday){count++;if(count===n)return d.getDate();} d.setDate(d.getDate()+1); }
  return null;
}
function today() { return new Date(); }

function getShiftPlan(key) {
  return state.shiftPlans[key] || {staffA:true,staffB:true,nightCashier:3,myDayOff:false,noManager:false};
}
function getDayLog(key) {
  const plan = state.shiftPlans[key] || {};
  const def = {
    checkedTasks:[], customTasks:[],
    staffA: plan.staffA!==undefined ? plan.staffA : true,
    staffB: plan.staffB!==undefined ? plan.staffB : true,
    nightCashier: plan.nightCashier!==undefined ? plan.nightCashier : 3,
    myDayOff: plan.myDayOff!==undefined ? plan.myDayOff : false,
    noManager: plan.noManager!==undefined ? plan.noManager : false,
  };
  return state.dailyLogs[key] ? {...def, ...state.dailyLogs[key]} : def;
}
function setDayLog(key, updates) {
  state.dailyLogs[key] = {...getDayLog(key), ...updates};
  saveState(); render();
}

function getDateTasks(date) {
  const d=date.getDate(), m=date.getMonth(), y=date.getFullYear();
  const tasks=[];
  if(d===9){tasks.push({id:"d9_card",text:"カードの日 準備"});tasks.push({id:"d9_maka",text:"まかせな祭 予告POP掲示（本番POPに予告貼付）"});}
  if(d===10)tasks.push({id:"d10_card",text:"カードの日 撤去"});
  if(d===14)tasks.push({id:"d14_maka",text:"まかせな祭 予告POP 撤去（予告部分のみ剥がす）"});
  if(d===15)tasks.push({id:"d15_maka",text:"まかせな祭 撤去"});
  if(d===24)tasks.push({id:"d24_card",text:"カードの日 準備"});
  if(d===25)tasks.push({id:"d25_card",text:"カードの日 撤去"});
  const m2 = getNthWeekday(y,m,1,2);
  if(m2){const db=new Date(y,m,m2-1);if(db.getDate()===d&&db.getMonth()===m)tasks.push({id:"fd_prep",text:"フードドライブ 準備（第2月曜前日）"});}
  const m3 = getNthWeekday(y,m,1,3);
  if(m3){const db=new Date(y,m,m3-1);if(db.getDate()===d&&db.getMonth()===m)tasks.push({id:"fd_remove",text:"フードドライブ 撤去（第3月曜前日）"});}
  return tasks;
}

function getAllTasks(date, log) {
  const dow = date.getDay();
  const tasks = [];
  (WEEKLY_TASKS[dow]||[]).forEach(t=>tasks.push({...t,category:"fixed"}));
  getDateTasks(date).forEach(t=>tasks.push({...t,category:"date"}));
  const dk = dateKey(date);
  (state.flyers||[]).forEach(f=>{
    if(f.end===dk) tasks.push({id:`fe_${f.id}`,text:`【チラシ入替】${f.label} 最終日 → POP総入替`,category:"flyer"});
    if(f.start===dk) tasks.push({id:`fs_${f.id}`,text:`【チラシ初日】${f.label} スタート`,category:"flyer"});
  });
  const isOrdA=[0,2,4].includes(dow), isOrdB=[1,3,5].includes(dow);
  if(!log.staffA){
    tasks.push(log.nightCashier>=3
      ? {id:"var_paper",text:"【A不在】紙 補充",category:"variable"}
      : {id:"var_paper_drink",text:"【A不在・レジ少】紙・飲料・酒 補充",category:"variable"});
    if(isOrdA) tasks.push({id:"var_order_a",text:"【A不在】一般食品・米 発注（自分で対応）",category:"variable"});
  }
  if(!log.staffB && isOrdB) tasks.push({id:"var_order_b",text:"【B不在】菓子・酒 発注（自分で対応）",category:"variable"});
  if(log.noManager) tasks.push({id:"var_cash",text:"【事務所全員不在】釣銭補充・余剰金処理・翌日釣銭準備",category:"variable"});
  (log.customTasks||[]).forEach(t=>tasks.push({...t,category:"custom"}));
  return tasks;
}

// ============================================================
// 状態
// ============================================================
let viewDate = new Date();
let currentTab = "today";

// シフトタブ用状態
function getShiftPeriods() {
  const periods=[], base=today();
  for(let i=-1;i<=2;i++){
    const ref=new Date(base.getFullYear(),base.getMonth()+i,1);
    const start=new Date(ref.getFullYear(),ref.getMonth(),21);
    const end=new Date(ref.getFullYear(),ref.getMonth()+1,20);
    const key=`${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,"0")}`;
    const label=`${start.getFullYear()}/${String(start.getMonth()+1).padStart(2,"0")}/21 〜 ${end.getFullYear()}/${String(end.getMonth()+1).padStart(2,"0")}/20`;
    periods.push({key,label,start,end});
  }
  return periods;
}
const shiftPeriods = getShiftPeriods();
const todayDate = today();
let selectedPeriodKey = (shiftPeriods.find(p=>p.start<=todayDate&&todayDate<=p.end)||shiftPeriods[1]).key;
let showBulk = false;
let bulkA=true, bulkB=true, bulkC=3;
let showAddFlyer = false;
let saveMsg = "";
let saveMsgTimer = null;
let backupMsg = "";
let backupMsgTimer = null;
let exportText = "";

// ============================================================
// HTML生成ヘルパー
// ============================================================
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})) {
    if(k==="class") e.className=v;
    else if(k==="style") e.style.cssText=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of children) {
    if(c===null||c===undefined) continue;
    if(typeof c==="string"||typeof c==="number") e.appendChild(document.createTextNode(c));
    else if(c instanceof Node) e.appendChild(c);
  }
  return e;
}
function div(attrs,...children){return el("div",attrs,...children);}
function span(attrs,...children){return el("span",attrs,...children);}
function btn(attrs,...children){return el("button",attrs,...children);}
function inp(attrs){return el("input",attrs);}
function label(attrs,...children){return el("label",attrs,...children);}

// ============================================================
// レンダリング
// ============================================================
function render() {
  renderHeader();
  renderToday();
  renderShift();
  renderFlyer();
  renderSettings();
  renderBackup();
}

function renderHeader() {
  const t = today();
  document.getElementById("header-sub").textContent =
    `${t.getFullYear()}/${String(t.getMonth()+1).padStart(2,"0")}/${String(t.getDate()).padStart(2,"0")}（${WEEKDAY[t.getDay()]}）今日`;

  const dk = dateKey(viewDate);
  const log = getDayLog(dk);
  const allTasks = getAllTasks(viewDate, log);
  const checked = allTasks.filter(t=>(log.checkedTasks||[]).includes(t.id)).length;
  const total = allTasks.length;
  const pct = total>0 ? Math.round(checked/total*100) : 0;

  // プログレス
  const circ = 2*Math.PI*22;
  document.getElementById("progress-circle").setAttribute("stroke-dashoffset", circ*(1-pct/100));
  document.getElementById("progress-text").textContent = pct+"%";

  // 日付表示
  const lbl = document.getElementById("view-date-label");
  lbl.innerHTML = "";
  const isToday = dateKey(viewDate)===dateKey(t);
  lbl.style.color = isToday ? "#38bdf8" : "#94a3b8";
  lbl.appendChild(document.createTextNode(`${viewDate.getMonth()+1}/${viewDate.getDate()}（${WEEKDAY[viewDate.getDay()]}）`));

function getDatesInPeriod(start,end) {
  const dates=[]; const d=new Date(start);
  while(d<=end){dates.push(new Date(d));d.setDate(d.getDate()+1);}
  return dates;
}

    const ta=el("textarea",{style:"height:120px;font-size:10px;font-family:monospace;"},exportText);
    ta.addEventListener("focus",e=>e.target.select());
    expCard.appendChild(ta);
  }
  if(backupMsg) expCard.appendChild(div({"class":"backup-msg"},backupMsg));
  panel.appendChild(expCard);

  // インポート
  const impCard=div({"class":"card"});
  impCard.appendChild(div({"class":"card-title"},"📥 バックアップから復元"));
  impCard.appendChild(div({"class":"help-text"},"保存したJSONテキストを以下に貼り付けて「復元」を押してください。"));
  const ta2=el("textarea",{style:"height:100px;font-size:10px;font-family:monospace;margin-bottom:8px;",placeholder:'{"flyers":[],"dailyLogs":{},"shiftPlans":{}}'});
  impCard.appendChild(ta2);
  impCard.appendChild(btn({"class":"add-btn",style:"width:100%;",onClick:()=>{
    try{
      const parsed=JSON.parse(ta2.value);
      state=parsed; saveState();
      ta2.value="";
      backupMsg="復元しました！";
    }catch{backupMsg="JSONの形式が正しくありません";}
    if(backupMsgTimer)clearTimeout(backupMsgTimer);
    backupMsgTimer=setTimeout(()=>{backupMsg="";render();},3000);
    render();
  }},"復元する"));
  panel.appendChild(impCard);

  // リセット
  const resetCard=div({"class":"card"});
  resetCard.appendChild(div({"class":"card-title"},"🗑️ データリセット"));
  resetCard.appendChild(div({"class":"help-text"},"全データを削除してリセットします。この操作は取り消せません。"));
  resetCard.appendChild(btn({"class":"reset-btn",onClick:()=>{
    if(window.confirm("全データをリセットしますか？バックアップを先に取ることをおすすめします。")){
      state=createInitialState(); saveState();
      backupMsg="リセットしました";
      if(backupMsgTimer)clearTimeout(backupMsgTimer);
      backupMsgTimer=setTimeout(()=>{backupMsg="";render();},3000);
      render();
    }
  }},"⚠️ リセット"));
  panel.appendChild(resetCard);
}

// ============================================================
// イベント設定
// ============================================================
document.getElementById("prev-btn").addEventListener("click",()=>{
  viewDate.setDate(viewDate.getDate()-1); render();
});
document.getElementById("next-btn").addEventListener("click",()=>{
  viewDate.setDate(viewDate.getDate()+1); render();
});

document.querySelectorAll(".tab-btn").forEach(b=>{
  b.addEventListener("click",()=>{
    currentTab=b.dataset.tab;
    document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    document.getElementById("panel-"+currentTab).classList.add("active");
    render();
  });
});

// 1分ごとに再描画（日付変わり目対応）
setInterval(()=>render(), 60000);

// 初回描画
render();
</script>
</body>
</html>
